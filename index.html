<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Filipino Learning Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Filipino Reading Game</h1>

  <main>
    <div class="card login-grid">
      <div>
        <h2>Student Login</h2>
        <p>
          <label for="studentNameInput" class="sr-only">Student name</label>
          <input id="studentNameInput" placeholder="Type your name" />
        </p>
        <p>
          <button id="studentLoginBtn">Start as Student</button>
        </p>
      </div>

      <div>
        <h2>Teacher Login</h2>
        <p>
          <label for="teacherPasswordInput" class="sr-only">Teacher password</label>
          <input id="teacherPasswordInput" type="password" placeholder="teacher123" />
        </p>
        <p>
          <button id="teacherLoginBtn">Teacher Login</button>
        </p>
        <div id="loginHint">Teacher password: <strong>teacher123</strong></div>
      </div>
    </div>
  </main>

  <section id="studentArea" class="card" style="display: none;">
    <h2 id="studentTitle"></h2>
    <div id="wordContainer">
      <strong>Word:</strong>
      <span id="word">mahal</span>
    </div>

    <button id="startBtn">Start Speech Check</button>
    <button id="resetBtn">Reset Progress</button>
    <button id="exportBtn">Export My Progress</button>

    <div id="result" style="margin-top: 1rem;">Press button and speak.</div>
    <div id="score">Score: 0</div>
    <div id="badges">Badges: None</div>

    <button id="logoutBtn">Logout</button>
  </section>

  <section id="teacherArea" class="card" style="display: none;">
    <h2>Teacher Dashboard</h2>
    <div class="login-grid" style="grid-template-columns: auto auto; gap: 0.8rem;">
      <button id="refreshLogBtn">Refresh student list</button>
      <button id="exportCsvBtn">Export CSV</button>
      <button id="adminLogoutBtn" class="secondary">Logout</button>
    </div>

    <div id="teacherResult"></div>
    <table id="studentTable" border="1" style="width: 100%; margin-top: 1rem; border-collapse: collapse;"></table>
  </section>

  <script src="script.js" defer></script>
</body>
</html>
